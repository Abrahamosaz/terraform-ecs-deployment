version: '3.9'
services:
  db:
    image: mysql:8.0
    container_name: app-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - '3307:3306'
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: abrahamosaz/ecs-project-backend:latest
    container_name: app-backend
    environment:
      MYSQL_HOST: db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
      MYSQL_DATABASE: appdb
      PORT: 4000
    ports:
      - '4000:4000'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: abrahamosaz/ecs-project-frontend:latest
    container_name: app-frontend
    environment:
      BACKEND_URL: http://backend:4000
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  db-data:
