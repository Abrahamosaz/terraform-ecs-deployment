<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Simple Frontend</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 2rem;
      background: #0f172a;
      color: #e5e7eb;
    }

    .card {
      max-width: 480px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      border-radius: 1rem;
      background: #020617;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.3);
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    button {
      margin-top: 0.75rem;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      border: none;
      background: #22c55e;
      color: #022c22;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border-radius: 0.75rem;
      border: 1px solid #4b5563;
      background: #020617;
      color: #e5e7eb;
      margin-top: 0.75rem;
    }

    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
    }

    .message-box {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      background: rgba(15, 118, 110, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.35);
      font-size: 0.9rem;
    }

    .status {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: #9ca3af;
      min-height: 1.2rem;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Frontend ↔ Backend ↔ MySQL</h1>
    <div class="label">Current message from database</div>
    <div id="message" class="message-box">Loading...</div>
    <div class="label" style="margin-top:1rem">Set new message</div>
    <input id="newMessage" placeholder="Type a message and save" />
    <button id="saveBtn">Save to MySQL</button>
    <div id="status" class="status"></div>
  </div>
  <script>
    const backendUrl = (window.BACKEND_URL) || `${window.location.origin}/backend`;

    async function loadMessage() {
      const statusEl = document.getElementById('status');
      statusEl.textContent = 'Fetching message from backend...';
      try {
        const res = await fetch(`${backendUrl}/api/message`);
        const data = await res.json();
        document.getElementById('message').textContent = data.message || '(no message)';
        statusEl.textContent = 'Loaded from backend.';
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Error talking to backend.';
      }
    }

    async function saveMessage() {
      const input = document.getElementById('newMessage');
      const statusEl = document.getElementById('status');
      const content = input.value.trim();
      if (!content) {
        statusEl.textContent = 'Please type a message first.';
        return;
      }
      statusEl.textContent = 'Saving to backend...';
      try {
        await fetch(`${backendUrl}/api/message`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content }),
        });
        input.value = '';
        await loadMessage();
        statusEl.textContent = 'Saved!';
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Error saving to backend.';
      }
    }

    document.getElementById('saveBtn').addEventListener('click', saveMessage);
    loadMessage();
  </script>
</body>

</html>
